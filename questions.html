<!DOCTYPE html>
<html>

<head>

     <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="./Pictures/5.png" sizes="32x32"/>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
    <title>Viva Questions</title>

    <style>
        body {
            font-family: Poppins;
          background:linear-gradient(135deg,#eef3f9,#dbe7f5,#cfdced); ;
            color: rgb(22, 15, 15);
          
            padding: 40px;
 
        }
body::before{
content:"";
 
 

background: rgba(255,255,255,0.35);
backdrop-filter: blur(8px);
-webkit-backdrop-filter: blur(10px);

z-index:-1;
}
        .question-card {
         
   background:white;
padding:40px;
border-radius:16px;
box-shadow:0 20px 40px rgba(0,0,0,0.1);
        }

        textarea {
         
          width:100%;
height:140px;
border:1px solid #e2e8f0;
border-radius:10px;
padding:15px;
font-size:15px;
outline:none;
resize:none;
transition:0.3s;
        }
textarea:focus{
border-color:#3b82f6;
box-shadow:0 0 0 3px rgba(59,130,246,0.15);
}

        button {
        
             margin-top:20px;
    background:linear-gradient(135deg,#2c7be5,#1a5fd0);
    border:none;
    color:white;
    padding:12px 30px;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
        }
        button:hover{
            transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,0.15);
        }
        .small-logo {
      position: fixed;
        top: 2px;
        left: 45%;
        width: 150px;
        height: 120px;
        cursor: pointer;
        border-radius: 8px;
        transition: transform 0.3s;
        z-index: 1000;
    padding: 10px 0 10px 0;

        transform: scale(1.3);
 
}


       
    </style>

</head>

<body>
     <img src="./Pictures/6.png" class="small-logo" alt="menu" />

    <h2 id="step"></h2>

    <div id="container">
        <!--New-->
 




        <!--end-->
    </div>

    <script>

        
       const API_BASE_URL = "http://127.0.0.1:8000";

        const questions = JSON.parse(localStorage.getItem("apiQuestions"));

        let currentIndex = 0;

        let studentAnswers = [];

        const container = document.getElementById("container");

        const step = document.getElementById("step");

        function loadQuestion() {

            container.innerHTML = "";

            step.innerText = `Question ${currentIndex + 1} of ${questions.length}`;

            const card = document.createElement("div");

            card.className = "question-card";

            const q = document.createElement("p");

            q.innerText = questions[currentIndex];

            card.appendChild(q);

            const textarea = document.createElement("textarea");

            textarea.id = "answer";

            card.appendChild(textarea);

            const next = document.createElement("button");

            if (currentIndex === questions.length - 1) {
                next.innerText = "Finish & Grade";
            } else {
                next.innerText = "Next";
            }

            next.onclick = async () => {

                const ans = document.getElementById("answer").value;

                if (ans.trim() === "") {
                    alert("Please answer the question");
                    return;
                }

                studentAnswers.push(ans);

                if (currentIndex < questions.length - 1) {

                    currentIndex++;

                    loadQuestion();

                } else {

                    container.innerHTML = "<h2>Processing...</h2>";

                   /* const response = await fetch(`${API_BASE_URL}/evaluate`, {

                        method: "POST",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        body: JSON.stringify({
                            student_answers: studentAnswers
                        })

                    });

                    const result = await response.json();

                    showResults(result.evaluation);*/
                  const response = await fetch(`${API_BASE_URL}/evaluate`, {

    method: "POST",

    headers: {
        "Content-Type": "application/json"
    },

   body: JSON.stringify({
    questions: questions,
    student_answers: studentAnswers
})

});

const result = await response.json();

console.log(result);    
if (!result.evaluation) {
    container.innerHTML = "<h2>Server Error</h2>";
    return;
}

showResults(result.evaluation);

                }

            }

            card.appendChild(next);

            container.appendChild(card);

        }

        function showResults(evaluation) {

            container.innerHTML = "";

            let total = 0;

            evaluation.forEach(e => total += e.score);

            let percent = Math.round((total / (evaluation.length * 10)) * 100);

            let html = `<h2>Final Score ${percent}%</h2>`;

            evaluation.forEach((e, i) => {

                html += `

<div class="question-card">

<p><b>Question ${i + 1}</b></p>

<p>Score: ${e.score}/10</p>

<p>${e.feedback}</p>

</div>

`;

            });

            container.innerHTML = html;

        }

        loadQuestion();

    </script>

</body>

</html>

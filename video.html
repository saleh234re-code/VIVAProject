 
<!DOCTYPE html>
<html>

<head>

     <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="./Pictures/5.png" sizes="32x32"/>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
<title>Video Recording</title>
 
<style>
.small-logo {
        position: fixed;
        top: 2px;
        left: 20px;
        width: 150px;
        height: 120px;
        cursor: pointer;
        border-radius: 8px;
        transition: transform 0.3s;
        z-index: 1000;
    
        transform: scale(1.3);

      }
body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#eef3f9,#bbd4f1,#cfdced); ;
 
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}
body::before{
content:"";
 
 

background: rgba(255,255,255,0.35);
backdrop-filter: blur(8px);
-webkit-backdrop-filter: blur(10px);

z-index:-1;
}
/* TIMER */

#timer{
position:fixed;
top:15px;
left:50%;
transform:translateX(-50%);
background:#081b34;
padding:6px 18px;
border-radius:10px;
font-weight:bold;
}

/* VIDEO */
 .iconBtn:hover{
 transform: scale(1.1);

 }
 


 .videoContainer{
display:flex;
align-items:center;
justify-content:center;
gap:25px;
margin-top:20px;
}

/* PROJECT FILE */

#projectViewer{
display:none;
width:500px;
height:430px;
border-radius:15px;
border:4px solid #1a66d1;
background:white;
}

/* VIDEO */

video{
width:750px;
height:430px;
border-radius:15px;
border:4px solid #1a66d1;
background:black;
box-shadow:0 0 20px #1a66d1;
}
/* عند فتح الملف */

#projectViewer.show{

display:block;

position:fixed;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:900px;
height:520px;

z-index:1000;

}

/* تصغير الفيديو */

video.small{

position:fixed;

bottom:20px;
right:20px;

width:260px;
height:150px;

z-index:1100;

}
 

.controls{
 
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:40px;
z-index:2000;
}

.iconBtn{
background:none;
border:none;
cursor:pointer;
position:relative;
}

.iconBtn img{
width:45px;
}

/* RED LINE WHEN OFF */

.iconBtn::after{
content:"";
position:absolute;
width:60px;
height:4px;
background:red;
top:50%;
left:50%;
transform:translate(-50%,-50%) rotate(-45deg);
display:none;
}

.iconBtn.off::after{
display:block;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.popupBox{
background:white;
color:black;
padding:30px;
border-radius:15px;
text-align:center;
}

.popupBox button{
margin-top:15px;
padding:10px 20px;
border:none;
background:#1a66d1;
color:white;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>
 <img src="./Pictures/6.png" class="small-logo" alt="menu" />
<div id="timer">00:00</div>

 <div class="videoContainer">
 <iframe id="projectViewer" 
 ></iframe>
<video id="video" autoplay playsinline></video>
      

 </div>     
<div class="controls">

<button id="cameraBtn" class="iconBtn" title="Turn Camera On/Off">
<img src="camera.png">
</button>

<button id="micBtn" class="iconBtn" title="Mute / Unmute Microphone">
<img src="mic.png">
</button>

<button id="recordBtn" class="iconBtn" title="Start / Stop Recording">
<img src="record.png">
</button>

<button id="endBtn" class="iconBtn" title="End Recording" >
<img src="Annotation_2025-11-28_120500-removebg-preview.png">
</button>
                                                 

<button id="projectBtn" class="iconBtn" title="Show Project File">
<img src="./Pictures/file.png" style="color: red;" >
</button>
  
</div>
<div id="resultDisplay" style="text-align:center;margin-top:20px;">
<p id="transcriptionText" style="color:#ccc;font-style:italic;"></p>
<h3 id="emotionText"></h3>
</div>

<div class="popup" id="popup">

<div class="popupBox">

<h3>Recording Finished</h3>
<p>Move to questions page?</p>

<div style="display:flex;gap:10px;justify-content:center">

<button onclick="goQuestions()">Continue</button>

<button onclick="closePopup()" style="background:#777">
Cancel
</button>

</div>

</div>

<script>

let stream;

navigator.mediaDevices.getUserMedia({

video:{
width:{ideal:1920},
height:{ideal:1080},
frameRate:{ideal:30}
},

audio:true

}).then(s=>{
stream=s;
document.getElementById("video").srcObject=stream;
});

/* CAMERA */

let cameraOn=true;

cameraBtn.onclick=()=>{

const track=stream.getVideoTracks()[0];

cameraOn=!cameraOn;

track.enabled=cameraOn;

cameraBtn.classList.toggle("off");

}

/* MIC */

let micOn=true;

micBtn.onclick=()=>{

const track=stream.getAudioTracks()[0];

micOn=!micOn;

track.enabled=micOn;

micBtn.classList.toggle("off");

}

/* RECORD */
/*
let mediaRecorder;
let recording=false;

recordBtn.onclick=()=>{

recording=!recording;

if(recording){

mediaRecorder=new MediaRecorder(stream);
mediaRecorder.start();

}else{

mediaRecorder.stop();

}

recordBtn.classList.toggle("off");

}*/
let mediaRecorder;
let chunks=[];
let recording=false;

recordBtn.onclick=()=>{

recording=!recording;

if(recording){

chunks=[];
mediaRecorder=new MediaRecorder(stream);

mediaRecorder.ondataavailable = e=>{
chunks.push(e.data);
};

mediaRecorder.onstop = async ()=>{

const blob = new Blob(chunks,{type:"audio/webm"});

const formData = new FormData();
formData.append("file",blob,"record.webm");

await fetch("http://127.0.0.1:8000/upload-video",{
method:"POST",
body:formData
});

getAnalysis();

};

mediaRecorder.start();

}else{

mediaRecorder.stop();

}

recordBtn.classList.toggle("off");

}

/* END */

endBtn.onclick = () => {

if(recording && mediaRecorder){
mediaRecorder.stop();
}

if(stream){
stream.getTracks().forEach(track=>track.stop());
}

document.getElementById("popup").style.display="flex";

}

/* GO QUESTIONS */

function goQuestions(){

window.location.href="questions.html";

}

/* TIMER */

let seconds=0;

setInterval(()=>{

seconds++;

let min=String(Math.floor(seconds/60)).padStart(2,'0');
let sec=String(seconds%60).padStart(2,'0');

document.getElementById("timer").innerText=`${min}:${sec}`;

},1000);

 
let projectVisible = false;

projectBtn.onclick = () => {

const viewer = document.getElementById("projectViewer");
const video = document.getElementById("video");

projectVisible = !projectVisible;

if(projectVisible){

const fileData = localStorage.getItem("fileData");

if(fileData){

viewer.src = fileData;

viewer.classList.add("show");
video.classList.add("small");

}else{

alert("No project file uploaded");

}

}else{

viewer.classList.remove("show");
video.classList.remove("small");

}

};
 
 async function getAnalysis(){

const response = await fetch("http://127.0.0.1:8000/get-video-analysis");
const data = await response.json();

document.getElementById("transcriptionText").innerText =
"You said: " + data.text;

document.getElementById("emotionText").innerText =
"Detected Emotion: " + data.emotion;

}
function closePopup(){

document.getElementById("popup").style.display="none";

}
</script>

</body>

</html>
